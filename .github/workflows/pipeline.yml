name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test-build:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        shell: bash
        run: |
          if bun pm pkg get scripts.test >/dev/null 2>&1; then
            bun run test
          elif find . -type f \( -name "*.test.*" -o -name "*.spec.*" \) | grep -q .; then
            bun test
          else
            echo "No test script or test files found; skipping tests."
          fi

      - name: Build
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: insighta-web-dist
          path: dist
          if-no-files-found: error
